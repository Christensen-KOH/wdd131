<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content=" Improve your English fluency with Speak up with Chris. Book personalized, conversational English lessons and access custom learning resources online.">
    <meta name="author" content=" Christensen KOH">
    <title>Speak up with Chris | Language Tutoring</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="scripts/script.js" defer></script>
</head>

<body>

    <header>
        <img src="images/logo.webp" alt="Speak up logo">
        <button id="menu" aria-label="Main Menu">☰</button>
        <nav class="nav">
            <ol>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="book.html">Book a session</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ol>
        </nav>
    </header>

    <main class="booking-container">
        <section class="form-header">
            <h1>Secure Your Spot</h1>
            <p>Complete the details below to start your journey toward English fluency.</p>
        </section>
    
        <form id="lesson-booking-form" action="#" method="post" class="styled-form">
            <div class="form-section">
                <label for="tutor-display">Selected Mentor</label>
                <input type="text" id="tutor-display" name="tutor" readonly class="readonly-input">
            </div>
    
            <div class="form-grid">
                <div class="form-group">
                    <label for="student-name">Full Name</label>
                    <input type="text" id="student-name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="student-email">Email Address</label>
                    <input type="email" id="student-email" name="email" placeholder="john@example.com" required>
                </div>
            </div>
    
            <div class="form-section">
                <label for="lesson-date">Preferred Lesson Date & Time</label>
                <input type="datetime-local" id="lesson-date" name="lesson-time" required>
                <small>We will confirm the final slot based on availability.</small>
            </div>
    
            <div class="form-section">
                <label for="english-level">Current English Level</label>
                <select id="english-level" name="level">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
    
            <div class="form-section">
                <label for="goal">Primary Learning Goal</label>
                <textarea id="goal" name="goal" rows="3"
                    placeholder="e.g., Prepping for a promotion interview or traveling to Europe..." required></textarea>
            </div>
    
            <button type="submit" class="cta-button">Confirm Booking Request</button>
        </form>
    </main>

    <footer>
        <p>&copy; &#9827; <span id="current-year">2026</span> &#9827; Christensen KOH | Ivory Coast</p>
        <p><span id="lastModified">Last Modified: </span></p>

                <img src="images/youtube.svg" alt="Visit our youtube channel">

            </a>
            <a href="https://WA.me/79528366025">
                <img src="images/whatsapp.svg" alt="Contact us on Whatsapp">
            </a>

            <a href="https://www.instagram.com/chris2dios?igsh=YTR2MGM5dmRsa3p5">
                <img src="images/instagram.svg" alt="Contact us on Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
